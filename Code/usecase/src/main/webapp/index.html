<html>
<body data-lift-content-id="main">
	<div id="main" data-lift="surround?with=default;at=content">

		<h1>Use Case Editor</h1>

		<div id="uce" data-lift="UCEditor">
			<div>
				<form data-lift="form.ajax">
					<span id="uc_id">UC-<span id="uc_id_num">123</span></span>:
					<input name="title" value="Use Case Title" />
				</form>
			</div>
			<div id="steps">
				<div class="step">
					<span class="label">1.0</span>
					<form data-lift="form.ajax" style="display:inline">
						<textarea name="text" rows="4">Blah blah blah.</textarea>
					</form>
					<button class="add">ADD</button>
					<button class="indentDec">&lt;&lt;</button>
					<button class="indentInc">&gt;&gt;</button>
				</div>
			</div>
		</div>

	</div>
</body>
</html>
