<html>
<head>
<meta content="text/html; charset=UTF-8" http-equiv="content-type">
<link type="text/css" rel="stylesheet" href="css/normalize.css" />
<link type="text/css" rel="stylesheet" href="css/common.css" />
<script type="text/javascript" src="js/vendor/jquery.js"></script>
<script type="text/javascript" src="../../../target/scala-2.10/resource_managed/main/js/application.js"></script>
<script type="text/javascript" src="../../../target/scala-2.10/resource_managed/main/js/knockout.js"></script>
<script type="text/javascript" src="../javascript/list.js"></script>

<style media="screen" type="text/css">
</style>
</head>
<body data-lift-content-id="main">
	<div id="main" data-lift="surround?with=default;at=content">
		<div data-lift="UseCaseIndex" class="ucindex">

			<link type="text/css" rel="stylesheet" href="css/list.css" data-lift="head" />
			<script type="text/javascript" data-lift="head" src="/js/knockout.js"></script>
			<script type="text/javascript" data-lift="head" src="/js/list.js"></script>

			<div class="new_uc">
				<button onClick="$(document).trigger('new-uc',{'number':9,'title':'NEW','updatedAt':'1980-09-11T00:00:00Z'})">+ New UC</button>
			</div>

			<div class="no_ucs" data-bind="ifnot: populated">
				No use cases defined yet. Add some!
			</div>

			<div class="some_ucs" data-bind="if: populated">
				<div class="uc_list" data-bind="foreach: {data: useCases, afterAdd: enhanceDom }">

					<div class="uc" data-bind="visible: !$data.editMode()">
						<div class="ctls">
							<button class="edit" data-bind="click: $data.enterEditMode">Edit</button>
						</div>
						<div class="data">
							<a data-bind="attr: {href: $data.viewUrl}">UC-<span data-bind="text: $data.number"></span>: <span data-bind="text: $data.title"></span></a>
							<div class="last_updated">Last updated <abbr class="timeago" data-bind="attr: {title:$data.updatedAt}"></abbr>.</div>
						</div>
					</div>

					<div class="uc edit" data-bind="visible: $data.editMode, css: cssClass">
						<form data-bind="submit: $data.save">
							<span class="num">UC-<span data-bind="text: $data.number"></span>:</span>
							<input class="save" type="submit" value="Save"/>
							<div class="title"><textarea class="enterSubmitsForm" rows="1" data-bind="value: $data.title" name="title"></textarea></div>
						</form>
					</div>

				</div>
			</div>

			<script type="text/javascript" id="initVM">
				var VM = new UCIViewModel([
					{ dataEid:'d1', valueEid:'v1', number:1, title:"Eat meat so that my body absorbs other animals' bodies giving them a taste of humanity when I have a taste of them", updatedAt:"2013-06-10T16:55:00+10:00" },
					{ dataEid:'d2', valueEid:'v1', number:2, title:"Drink beer", updatedAt:"2013-06-12T10:21:00+10:00" },
					{ dataEid:'d3', valueEid:'v1', number:3, title:"Get warm", updatedAt:"2013-01-01T10:21:00+10:00" },
				])
				// VM = new UCIViewModel([])
			</script>

		</div>
	</div>
</body>
</html>
