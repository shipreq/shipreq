global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    metrics_path: '/cadvisor/metrics'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'prometheus'
    metrics_path: '/prometheus/metrics'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'webapp-dev'
    metrics_path: '/ops/metrics'
    static_configs:
      - targets: ['webapp:8080']

  - job_name: 'webapp-local'
    metrics_path: '/ops/metrics'
    static_configs:
      - targets: ['parent-host:8080']

  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['pgexp:9187']
