global:
  scrape_interval: 5s

scrape_configs:
  # - job_name: 'prometheus'
  #   static_configs:
  #     - targets: ['localhost:9090']
  - job_name: 'webapp-dev'
    static_configs:
      - targets: ['webapp:9095']
  - job_name: 'webapp-local'
    metrics_path: '/ops/metrics'
    static_configs:
      - targets: ['parent-host:8080']
