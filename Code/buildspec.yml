version: 0.2

phases:
  pre_build:
    commands:
      - cd Code
      - export JAVA_OPTS="-Xms512m -Xmx4g -Xss2m"
      - export SHIPREQ_RELEASE_TARGET=/shipreq.out
  build:
    commands:
      - >
        /bin/bash -c 'set -o pipefail;
        sbt -DMODE=release
        test:compile
        webapp-base-test-js/test:fullOptJS
        webapp-client-home/fullOptJS
        webapp-client-home/test:fullOptJS
        webapp-client-project/fullOptJS
        webapp-client-project/test:fullOptJS
        webapp-client-public-js/fullOptJS
        webapp-client-public-js/test:fullOptJS
        webapp-client-ww/fullOptJS
        webapp-client-ww/test:fullOptJS
        webapp-gen-js/fullOptJS
        webapp-gen-js/test:fullOptJS
        webapp-server-logic-js/test:fullOptJS
        test
        | strip-ansi'
    finally:
      - find /root/.cache/coursier /root/.ivy2 /root/.sbt -name '*.lock' -type f -exec rm -fv {} +

cache:
  paths:
    - '/root/.cache/coursier/**/*'
    - '/root/.ivy2/**/*'
    - '/root/.sbt/**/*'
    - '/shipreq.out/**/*'
