version: 0.2

phases:
  pre_build:
    commands:
      - cd DockerImages/build
      - env|sort
      - $(aws ecr get-login --no-include-email --region $AWS_REGION)
  build:
    commands:
      - >
        docker build
        -t $IMAGE_URL:git-$CODEBUILD_RESOLVED_SOURCE_VERSION
        -t $IMAGE_URL:latest
        .
  post_build:
    commands:
      - docker push $IMAGE_URL:git-$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push $IMAGE_URL:latest
