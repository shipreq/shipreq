apiVersion: 1

datasources:

- name: Prometheus (tech)
  type: prometheus
  access: proxy
  url: ${PROMETHEUS_TECH_URL}
  basicAuth: false
  isDefault: true
  jsonData:
    timeInterval: '${PROMETHEUS_TECH_SCRAPE_INTERVAL}'

- name: Prometheus (biz)
  type: prometheus
  access: proxy
  url: ${PROMETHEUS_BIZ_URL}
  basicAuth: false
  isDefault: false
  jsonData:
    timeInterval: '${PROMETHEUS_BIZ_SCRAPE_INTERVAL}'
