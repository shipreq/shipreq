version: 0.2

phases:
  install:
    runtime-versions:
      docker: 18
  pre_build:
    commands:
      - cd Images/ops-portal
      - env|sort
      - $(aws ecr get-login --no-include-email --region $AWS_REGION)
      - docker pull $IMAGE_URL:latest || true
  build:
    commands:
      - docker build -t $IMAGE_URL:latest .
  post_build:
    commands:
      - docker push $IMAGE_URL:latest
