# =====================================================================================================================
# shipreq_users_total

shipreq_users:
  query: >-
    select 'public' user_type, 'n' registered, count(1) total from usr where username is null
    union all
    select user_type_by_username(username), 'y', count(1) from usr where username is not null group by user_type_by_username(username)
  metrics:
  - user_type:
      usage: LABEL
  - registered:
      usage: LABEL
  - total:
      usage: GAUGE

# =====================================================================================================================
# shipreq_users_last_login_seconds_ago{,_count,_sum}

# -- Test with fake data
# with t1 as (
#     select unnest(array[1, 1.5, 2, 5, 10, 10, 10, 10, 10, 100]) t
# ), t2 as (
#     select now() - (t || ' days')::interval t from t1
# ), t3 as (
#     select extract(epoch from now() - t) t from t2
# ), ps as (
#     select unnest(array[1,.9,.7,.5,.3,.1,0]) p
# )
# select p, percentile_cont(p) within group (order by t) from t3, ps
# group by p

shipreq_users_last_login:
  query: >-
    with ps as (
      select unnest(array[1,.9,.7,.5,.3,.1,0]) p
    ), ages as (
      select user_type_by_username(username) user_type, extract(epoch from now() - last_login_at) t
      from usr
      where username is not null
    )
    select user_type, (p*100)::smallint as p, percentile_cont(p) within group (order by t) seconds_ago
    from ages, ps
    group by p, user_type
  metrics:
  - user_type:
      usage: LABEL
  - p:
      usage: LABEL
  - seconds_ago:
      usage: GAUGE

shipreq_users_last_login_seconds:
  query: >-
    select user_type_by_username(username) user_type, count(1) ago_count
    from usr
    where username is not null
    group by user_type_by_username(username)
  metrics:
  - user_type:
      usage: LABEL
  - ago_count:
      usage: GAUGE

shipreq_users_last_login_seconds_ago:
  query: >-
    select user_type_by_username(username) user_type, coalesce(sum(extract(epoch from now() - last_login_at)),0) sum
    from usr
    where username is not null
    group by user_type_by_username(username)
  metrics:
  - user_type:
      usage: LABEL
  - sum:
      usage: GAUGE

# =====================================================================================================================
# shipreq_projects_total

shipreq_projects:
  query: >-
    with projects as (
      select user_type_by_username(username) owner_type
      from project p, usr
      where p.usr_id = usr.id
    )
    select owner_type, 'y' live, count(1) total
    from projects
    group by owner_type
  metrics:
  - owner_type:
      usage: LABEL
  - live:
      usage: LABEL
  - total:
      usage: GAUGE

# =====================================================================================================================
# shipreq_events_total

shipreq_events:
  query: >-
    with projects as (
      select user_type_by_username(username) owner_type, events_total, events_init
      from project p, usr
      where p.usr_id = usr.id
    )
    select owner_type, 'y' live_project, 'y' initial, coalesce(sum(events_init),0) total from projects group by owner_type
    union all
    select owner_type, 'y', 'n', coalesce(sum(events_total - events_init),0) total from projects group by owner_type
  metrics:
  - owner_type:
      usage: LABEL
  - live_project:
      usage: LABEL
  - initial:
      usage: LABEL
  - total:
      usage: GAUGE

# =====================================================================================================================
# shipreq_reqs_total

shipreq_reqs:
  query: >-
    with projects as (
      select user_type_by_username(username) owner_type, reqs_total, reqs_live
      from project p, usr
      where p.usr_id = usr.id
    )
    select owner_type, 'y' live_project, 'y' live_req, 'y' live, coalesce(sum(reqs_live),0) total from projects group by owner_type
    union all
    select owner_type, 'y', 'n', 'n', coalesce(sum(reqs_total - reqs_live),0) from projects group by owner_type
  metrics:
  - owner_type:
      usage: LABEL
  - live:
      usage: LABEL
      description: "live_project && live_req"
  - live_project:
      usage: LABEL
  - live_req:
      usage: LABEL
  - total:
      usage: GAUGE

# =====================================================================================================================
# shipreq_db_table_bytes_total

shipreq_db_table:
  query: >-
    WITH tables as (
      SELECT
        table_name,
        table_type
      FROM information_schema.tables
      WHERE table_schema IN ('public','webapp')
        AND table_name NOT LIKE 'flyway_%'
        AND NOT(table_type = 'VIEW' AND pg_total_relation_size(table_name) = 0)
    )
    SELECT table_name AS table, 'table' AS type, pg_table_size(table_name) AS bytes_total FROM tables
    UNION ALL
    SELECT table_name, 'indexes', pg_indexes_size(table_name) FROM tables
  metrics:
  - table:
      usage: LABEL
  - type:
      usage: LABEL
  - bytes_total:
      usage: GAUGE

# =====================================================================================================================
# shipreq_project_last_access_seconds_ago{,_count,_sum}

shipreq_project_last_access:
  query: >-
    with ps as (
      select unnest(array[1,.9,.7,.5,.3,.1,0]) p
    ), ages as (
      select extract(epoch from now() - accessed_at) rw,
             extract(epoch from now() - updated_at) w,
             user_type_by_username(username) owner_type
      from project, usr
      where usr_id = usr.id
    )
    select owner_type, (p*100)::smallint as p, 'rw' as access, percentile_cont(p) within group (order by rw) seconds_ago from ages, ps group by p, owner_type
    union all
    select owner_type, (p*100)::smallint, 'w', percentile_cont(p) within group (order by w) from ages, ps group by p, owner_type
  metrics:
  - owner_type:
      usage: LABEL
  - p:
      usage: LABEL
  - access:
      usage: LABEL
  - seconds_ago:
      usage: GAUGE

shipreq_project_last_access_seconds:
  query: >-
    with projects as (
      select user_type_by_username(username) owner_type
      from project, usr
      where usr_id = usr.id
    )
    select owner_type, 'r' as access, count(1) ago_count from projects group by owner_type
    union all
    select owner_type, 'w', count(1) from projects group by owner_type
  metrics:
  - owner_type:
      usage: LABEL
  - access:
      usage: LABEL
  - ago_count:
      usage: GAUGE

shipreq_project_last_access_seconds_ago:
  query: >-
    with data as (
      select coalesce(sum(extract(epoch from now() - accessed_at)),0) r,
             coalesce(sum(extract(epoch from now() - updated_at)),0) w,
             user_type_by_username(username) owner_type
      from project, usr
      where usr_id = usr.id
      group by user_type_by_username(username)
    )
    select owner_type, 'r' as access, r sum from data
    union all
    select owner_type, 'w', w from data
  metrics:
  - owner_type:
      usage: LABEL
  - access:
      usage: LABEL
  - sum:
      usage: GAUGE

# =====================================================================================================================
# shipreq_daily_logins_total

shipreq_daily_logins:
  query: >-
    with utc as (
     select date_trunc('day', statement_timestamp() at time zone 'AEDT') at time zone 'AEDT' a,
            (date_trunc('day', statement_timestamp() at time zone 'AEDT') at time zone 'AEDT') + interval '23 hours' b
    ), range as (
      select (select a::date from utc) a_date,
             (select b::date from utc) b_date,
             (select extract(hour from a) from utc) a_hour,
             (select extract(hour from b) from utc) b_hour
    ), results1 as (
      select sum(total) total_sum,
             hll_union_agg(users) users
      from usr_logins_per_hour
      where (date = (select a_date from range) AND hour >= (select a_hour from range)) OR
            (date = (select b_date from range) AND hour <= (select b_hour from range))
      union all
      select 0, hll_empty()
    ), results2 as (
      select sum(total_sum) total_sum,
             hll_union_agg(users) users
      from results1
    ), results as (
      select *, #users user_count
      from results2
    )
    select 'y' unique_user,
           user_type,
           (r.user_count + u.count - #(r.users || u.users)) total -- |R ∩ U| = |R| + |U| - |R ∪ U|
    from users_by_type u, results r
    union all
    select 'n', '', total_sum from results
  metrics:
  - user_type:
      usage: LABEL
  - unique_user:
      usage: LABEL
  - total:
      usage: GAUGE

# =====================================================================================================================
# shipreq_daily_project_reads_total

shipreq_daily_project_reads:
  query: >-
    with utc as (
     select date_trunc('day', statement_timestamp() at time zone 'AEDT') at time zone 'AEDT' a,
            (date_trunc('day', statement_timestamp() at time zone 'AEDT') at time zone 'AEDT') + interval '23 hours' b
    ), range as (
      select (select a::date from utc) a_date,
             (select b::date from utc) b_date,
             (select extract(hour from a) from utc) a_hour,
             (select extract(hour from b) from utc) b_hour
    ), results1 as (
      select write,
             sum(total) total_sum,
             hll_union_agg(projects) projects
      from project_access_per_hour
      where (date = (select a_date from range) AND hour >= (select a_hour from range)) OR
            (date = (select b_date from range) AND hour <= (select b_hour from range))
      group by write
      union all
      select true, 0, hll_empty()
      union all
      select false, 0, hll_empty()
    ), results as (
      select write,
             sum(total_sum) total_sum,
             hll_union_agg(projects) projects
      from results1
      group by write
    ), results_rw as (
      select hll_union_agg(projects) projects from results
    )
    select '' owner_type, case when write then 'w' else 'r' end as access, 'n' unique_project, total_sum total from results
    union all
    select '', 'rw', 'n', sum(total_sum) from results
    union all
    select owner_type,
           case when write then 'w' else 'r' end,
           'y',
           hll_cardinality(r.projects) + p.count - #(r.projects || p.projects) -- |R ∩ P| = |R| + |P| - |R ∪ P|
    from projects_by_owner_type p, results r
    union all
    select owner_type,
           'rw',
           'y',
           hll_cardinality(r.projects) + p.count - #(r.projects || p.projects) -- |R ∩ P| = |R| + |P| - |R ∪ P|
    from projects_by_owner_type p, results_rw r
  metrics:
  - owner_type:
      usage: LABEL
  - access:
      usage: LABEL
  - unique_project:
      usage: LABEL
  - total:
      usage: GAUGE
